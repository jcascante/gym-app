services:

  # ─── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      # Expose as 9000 on the host — matches the existing vite.config.ts proxy target.
      # The engine already owns 8000 on the host; Docker's internal network is isolated
      # so backend still binds 8000 inside the container without any conflict.
      - "9000:8000"
    volumes:
      # Bind-mount source so --reload picks up every file change
      - ./backend:/app
      # Keep the SQLite DB on a named volume so it survives container restarts
      - backend_db:/app/data
    environment:
      ENVIRONMENT: development
      DATABASE_URL: sqlite+aiosqlite:///./gym_app.db
      SECRET_KEY: dev-secret-key-change-in-prod
      # Reach the TrainGen engine running on the host machine
      ENGINE_URL: http://host.docker.internal:8000
    restart: unless-stopped

  # ─── Vite frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source for HMR
      - ./frontend:/app
      # Named volume shadows node_modules so host OS doesn't override container's install
      - frontend_node_modules:/app/node_modules
    environment:
      # Vite proxies /api to the backend container via Docker's internal network
      API_TARGET: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ─── TrainGen Engine ────────────────────────────────────────────────────────
  # The engine runs directly on the host at port 8000.
  # The backend reaches it via host.docker.internal:8000 (ENGINE_URL above).
  # No container needed here.

volumes:
  backend_db:
  frontend_node_modules:
