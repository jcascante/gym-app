services:

  # ─── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      # Expose as 9000 on the host — matches the existing vite.config.ts proxy target.
      # program-builder container uses 8000; backend binds 8000 internally, exposed as 9000.
      - "9000:8000"
    volumes:
      # Bind-mount source so --reload picks up every file change
      - ./backend:/app
      # Keep the SQLite DB on a named volume so it survives container restarts
      - backend_db:/app/data
    environment:
      ENVIRONMENT: development
      DATABASE_URL: sqlite+aiosqlite:///./gym_app.db
      SECRET_KEY: dev-secret-key-change-in-prod
      # Local dev: HTTP mode. Production: set ENGINE_INVOCATION_MODE=lambda
      ENGINE_URL: http://program-builder:8000
      ENGINE_INVOCATION_MODE: http
    depends_on:
      - program-builder
    restart: unless-stopped

  # ─── Vite frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source for HMR
      - ./frontend:/app
      # Named volume shadows node_modules so host OS doesn't override container's install
      - frontend_node_modules:/app/node_modules
    environment:
      # Vite proxies /api to the backend container via Docker's internal network
      API_TARGET: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Program Builder (local dev — runs as FastAPI; production deploys as Lambda) ─
  program-builder:
    build:
      context: ./program-builder
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./program-builder/src:/app/src
      - ./program-builder/data:/data:ro
      - ./program-builder/definitions:/definitions:ro
      - ./program-builder/schemas:/schemas:ro
    environment:
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      DATA_DIR: /data
      DEFINITIONS_DIR: /definitions
      SCHEMAS_DIR: /schemas
    restart: unless-stopped

  # ─── Engine UI (local dev only — program definition builder) ────────────────
  engine-ui:
    build:
      context: ./engine-ui
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./engine-ui:/app
      - engine_ui_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - program-builder
    restart: unless-stopped

volumes:
  backend_db:
  frontend_node_modules:
  engine_ui_node_modules:
